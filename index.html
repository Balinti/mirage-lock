  <meta charset="UTF-8">

<body>
<div id="gc"><canvas id="c"></canvas></div>
<script>
// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('gc');
let W, H, DPR;
function resize() {
  DPR = window.devicePixelRatio || 1;
  const r = wrap.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);
const CX = () => W * .5;
const CY = () => H * .5;

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const LIVES_MAX   = 3;
const GEM_R       = 11;
const MRG_RX      = 58;
const MRG_RY      = 42;
const COOLDOWN_MS = 1500;
const FREEZE_MS   = 340;
const HEAT_THRESH = 3;
const ORBIT_RADII = [88, 138, 182, 222];
const LS_BEST     = 'mirageLock_allTimeBest';
const LS_DAILY    = 'mirageLock_dailyBest';
const LS_DATE     = 'mirageLock_dailyDate';
const MILESTONES  = {25:'LOCKED IN', 50:'SURGE', 75:'PHANTOM ZONE', 100:'MIRAGE MASTER'};

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = 'start';
let score, lives, combo, maxCombo, heatMode;
let gems, mirages, particles, floats;
let shakeX=0, shakeY=0, shakeF=0;
let bgHue=250, gt=0;
let retryCount=0, sessions=0;
let goTimer=0, orbitIdx=0;
let shownMilestones, targetScore=0, autoRestart=false;

// ── DIFFICULTY ────────────────────────────────────────────────────────────────
function diff() {
  if (score< 10) return {gems:1,mirs:1,driftM:1.00,orbitM:1.00,rxF:1.00,phantom:false};
  if (score< 25) return {gems:2,mirs:1,driftM:1.10,orbitM:1.10,rxF:1.00,phantom:false};
  if (score< 45) return {gems:2,mirs:2,driftM:1.25,orbitM:1.20,rxF:1.00,phantom:false};
  if (score< 70) return {gems:3,mirs:2,driftM:1.55,orbitM:1.35,rxF:1.00,phantom:false};
  if (score<100) return {gems:3,mirs:2,driftM:1.80,orbitM:1.55,rxF:0.80,phantom:false};
  return              {gems:3,mirs:2,driftM:2.10,orbitM:1.70,rxF:0.74,phantom:true};
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function initGame() {
  score=0; lives=LIVES_MAX; combo=0; maxCombo=0; heatMode=false;
  gems=[]; mirages=[]; particles=[]; floats=[];
  shakeX=shakeY=shakeF=0; bgHue=250; orbitIdx=0;
  shownMilestones=new Set();
  spawnGem(); spawnMirage();
}

// ── SPAWN GEM ─────────────────────────────────────────────────────────────────
function spawnGem() {
  const r   = ORBIT_RADII[(orbitIdx++) % ORBIT_RADII.length];
  const d   = diff();
  const spd = (0.007 + Math.random()*0.004) * d.orbitM;
  gems.push({
    angle: Math.random()*Math.PI*2,
    orbitR: r,
    angSpd: spd*(Math.random()>.5 ? 1:-1),
    hue: 40 + (orbitIdx*79)%280,
    x:0, y:0,
    insideMirage: null,
    state: 'orbiting',
    gp: Math.random()*Math.PI*2,
  });
}

// ── SPAWN MIRAGE ──────────────────────────────────────────────────────────────
function spawnMirage() {
  const d       = diff();
  const isP     = d.phantom && Math.random()<.28;
  const a       = [1,2,3][Math.floor(Math.random()*3)];
  const b       = [1,2,3][Math.floor(Math.random()*3)];
  const sc      = .82 + Math.random()*.32;
  mirages.push({
    t: Math.random()*900,
    a, b,
    delta: Math.random()*Math.PI*2,
    ampX: W*.28, ampY: H*.22,
    speed: .00075 + Math.random()*.0005,
    x:CX(), y:CY(),
    rx: MRG_RX*sc*d.rxF,
    ry: MRG_RY*sc*d.rxF,
    sc,
    sPhase: Math.random()*Math.PI*2,
    hue: 172+Math.random()*22,
    state: 'drifting',
    frozenT:0, coolT:0,
    containsGem:null,
    isPhantom:isP,
    _dead:false,
    fadeIn:0, shimA:0,
  });
}

// ── ADJUST DIFFICULTY ─────────────────────────────────────────────────────────
function adjustDiff() {
  const d = diff();
  const ag = gems.filter(g=>g.state!=='caught');
  while (ag.length < d.gems) { spawnGem(); ag.push({}); }
  const am = mirages.filter(m=>!m._dead);
  while (am.length < d.mirs) { spawnMirage(); am.push({}); }
  mirages.forEach(m=>{
    if (m._dead) return;
    m.rx = MRG_RX*m.sc*d.rxF;
    m.ry = MRG_RY*m.sc*d.rxF;
  });
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function burst(x,y,n,col,spd=3.5,life=24,sz=4) {
  for (let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+(Math.random()-.5)*.5;
    const s=spd*(.6+Math.random()*.8);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,col,sz:sz*(.5+Math.random()*.8)});
  }
}
function nearMissShards(x,y){
  for(let i=0;i<8;i++){
    const a=-.6+Math.random()*1.2, s=2.5+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:22,maxLife:22,col:`hsl(${8+Math.random()*25},100%,60%)`,sz:2.5+Math.random()*2.5});
  }
}
function freezeShards(mx,my,rx){
  for(let i=0;i<6;i++){
    const a=(Math.PI*2/6)*i;
    particles.push({x:mx,y:my,vx:Math.cos(a)*3.2,vy:Math.sin(a)*3.2,life:14,maxLife:14,
      col:'hsl(185,90%,80%)',sz:1.8,ex:mx+Math.cos(a)*(rx+18),ey:my+Math.sin(a)*(rx+18),line:true});
  }
}
function vignette(){
  particles.push({vignette:true,life:22,maxLife:22,x:0,y:0,vx:0,vy:0,col:'',sz:0});
}
function floatText(x,y,txt,col='hsl(185,90%,70%)',sz=20){
  floats.push({x,y,txt,col,sz,life:42,maxLife:42,vy:-1.4});
}
function shake(mag,frames){
  shakeF=frames;
  shakeX=(Math.random()-.5)*mag*2;
  shakeY=(Math.random()-.5)*mag*2;
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
const getBest = ()=>parseInt(localStorage.getItem(LS_BEST)||'0');
const setBest = v=>localStorage.setItem(LS_BEST,v);
function getDailyBest(){
  const t=new Date().toDateString();
  if(localStorage.getItem(LS_DATE)!==t){localStorage.setItem(LS_DATE,t);localStorage.setItem(LS_DAILY,'0');}
  return parseInt(localStorage.getItem(LS_DAILY)||'0');
}
function setDailyBest(v){localStorage.setItem(LS_DATE,new Date().toDateString());localStorage.setItem(LS_DAILY,v);}

// ── INPUT ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('pointerdown', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const tx=(e.clientX-rect.left)*(W/rect.width);
  const ty=(e.clientY-rect.top)*(H/rect.height);

  if (state==='start'){state='playing';initGame();return;}

  if (state==='gameover'){
    // share hit-test
    if(Math.abs(tx-(CX()+60))<48 && Math.abs(ty-(H*.3+115))<18){shareScore();return;}
    // auto-restart toggle
    if(sessions>=3 && Math.abs(tx-CX())<88 && Math.abs(ty-(H*.3+137))<16){autoRestart=!autoRestart;return;}
    retryGame(); return;
  }

  if (state==='playing') freezeNearest();
});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();
    const r=wrap.getBoundingClientRect();
    canvas.dispatchEvent(new PointerEvent('pointerdown',{clientX:r.left+W/2,clientY:r.top+H/2}));
  }
});

// ── FREEZE LOGIC ──────────────────────────────────────────────────────────────
function freezeNearest(){
  let best=null, bestScore=-Infinity;
  mirages.forEach(m=>{
    if(m._dead||m.state!=='drifting') return;
    const s=m.containsGem?1e6:0;
    if(s>bestScore){bestScore=s;best=m;}
  });
  if(!best) return;

  if(best.isPhantom){
    mirages.forEach(m=>{if(!m.isPhantom&&!m._dead){m.state='cooling';m.coolT=2000;m.containsGem=null;}});
    best.state='cooling'; best.coolT=600;
    burst(best.x,best.y,10,'hsl(0,80%,60%)',2.5,18);
    floatText(best.x,best.y-36,'PHANTOM!','hsl(0,90%,65%)',19);
    shake(4,7); return;
  }

  best.state='frozen'; best.frozenT=FREEZE_MS;
  freezeShards(best.x,best.y,best.rx);

  if(best.containsGem){
    catchGem(best.containsGem,best);
  } else {
    best.state='cooling'; best.coolT=COOLDOWN_MS;
    floatText(best.x,best.y-32,'EMPTY','hsl(210,40%,60%)',15);
  }
}

function catchGem(gem,mir){
  score++; combo++; if(combo>maxCombo) maxCombo=combo;

  if(combo>=HEAT_THRESH&&!heatMode){
    heatMode=true;
    floatText(CX(),CY()-90,'HEAT MODE!','hsl(30,100%,65%)',26);
  }

  const dc=Math.hypot(gem.x-mir.x, gem.y-mir.y);
  if(dc<mir.rx*.35){
    score++;
    floatText(gem.x,gem.y-28,'PERFECT!','hsl(55,100%,65%)',20);
  } else {
    floatText(gem.x,gem.y-28,combo>1?`${combo}×`:'+1','hsl(185,90%,70%)',18);
  }

  checkMilestone();
  burst(gem.x,gem.y,12,`hsl(${gem.hue},90%,65%)`,4,26,5);
  if(combo>=3) shake(2,4);

  gem.state='caught'; gem.insideMirage=null;
  mir.containsGem=null; mir.state='cooling'; mir.coolT=COOLDOWN_MS;

  setTimeout(()=>{
    const i=gems.indexOf(gem); if(i>-1) gems.splice(i,1);
    if(gems.filter(g=>g.state!=='caught').length<diff().gems) spawnGem();
  },280);
}

function checkMilestone(){
  if(MILESTONES[score]&&!shownMilestones.has(score)){
    shownMilestones.add(score);
    floatText(CX(),CY(),MILESTONES[score],'hsl(55,100%,65%)',28);
  }
}

function gemEscape(gem){
  lives--; combo=0; heatMode=false;
  nearMissShards(gem.x,gem.y); vignette(); shake(4,7);
  gem.insideMirage.containsGem=null;
  gem.insideMirage=null; gem.state='orbiting';
  setTimeout(()=>{
    const i=gems.indexOf(gem); if(i>-1) gems.splice(i,1);
    if(gems.filter(g=>g.state!=='caught').length<diff().gems) spawnGem();
  },350);
  if(lives<=0) setTimeout(endGame,420);
}

function endGame(){
  state='gameover'; goTimer=1500; sessions++;
  const b=getBest(); if(score>b) setBest(score);
  const d=getDailyBest(); if(score>d) setDailyBest(score);
}

function retryGame(){retryCount++;state='playing';initGame();}

function shareScore(){
  const text=`I locked ${score} gems in MIRAGE LOCK 🔮\nCan you beat it?`;
  const url=`https://balinti.github.io/mirage-lock/?target=${score}`;
  if(navigator.share) navigator.share({title:'Mirage Lock',text,url}).catch(()=>{});
  else navigator.clipboard?.writeText(url).catch(()=>{});
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
let lastTs=0;
function update(dt){
  gt+=dt;

  if(state!=='playing'){
    if(state==='gameover'){goTimer-=dt;if(autoRestart&&goTimer<=0) retryGame();}
    return;
  }

  bgHue=250-Math.min(30,score*.3);
  adjustDiff();

  if(shakeF>0){shakeF--;shakeX=(Math.random()-.5)*shakeF*.85;shakeY=(Math.random()-.5)*shakeF*.85;}
  else{shakeX=shakeY=0;}

  // Mirages
  mirages.forEach(m=>{
    if(m._dead) return;
    if(m.fadeIn<1) m.fadeIn=Math.min(1,m.fadeIn+dt/500);
    if(m.state==='drifting'){
      m.t+=dt*m.speed*diff().driftM;
      m.sPhase+=dt*.01257;
    }
    m.x=CX()+m.ampX*Math.sin(m.a*m.t+m.delta);
    m.y=CY()+m.ampY*Math.sin(m.b*m.t);
    m.x=Math.max(m.rx+12,Math.min(W-m.rx-12,m.x));
    m.y=Math.max(m.ry+12,Math.min(H-m.ry-12,m.y));
    if(m.state==='frozen'){m.frozenT-=dt;if(m.frozenT<=0){m.state='cooling';m.coolT=COOLDOWN_MS;}}
    if(m.state==='cooling'){m.coolT-=dt;if(m.coolT<=0) m.state='drifting';}
    m.shimA=(.15+.15*Math.sin(m.sPhase))*m.fadeIn;
    if(m.state==='cooling') m.shimA*=.25;
    if(m.state==='frozen')  m.shimA=.04;
  });

  // Gems
  gems.forEach(gem=>{
    if(gem.state==='caught') return;
    gem.angle+=gem.angSpd;
    gem.x=CX()+Math.cos(gem.angle)*gem.orbitR;
    gem.y=CY()+Math.sin(gem.angle)*gem.orbitR;
    gem.gp+=dt*.003;

    const wasIn=gem.insideMirage;
    let found=null;
    mirages.forEach(m=>{
      if(m._dead||m.state==='cooling') return;
      const dx=gem.x-m.x, dy=gem.y-m.y;
      if((dx*dx)/(m.rx*m.rx)+(dy*dy)/(m.ry*m.ry)<=1) found=m;
    });

    if(found){
      if(!wasIn){gem.insideMirage=found;found.containsGem=gem;gem.state='in_mirage';}
    } else {
      if(wasIn&&gem.state==='in_mirage') gemEscape(gem);
      else{gem.insideMirage=null;gem.state='orbiting';}
    }
  });

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy*=.93;p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
  // Floats
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i];f.y+=f.vy;f.life--;
    if(f.life<=0) floats.splice(i,1);
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
const bgSp=Array.from({length:30},()=>({
  x:Math.random(),y:Math.random(),
  sz:.5+Math.random()*1.5,spd:.00004+Math.random()*.00008
}));

function render(){
  ctx.save();
  ctx.translate(shakeX,shakeY);

  // Background gradient
  const g=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),Math.max(W,H)*.72);
  g.addColorStop(0,`hsl(${bgHue},55%,9%)`);
  g.addColorStop(1,`hsl(${bgHue-25},55%,4%)`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Ambient specks
  bgSp.forEach(s=>{
    const y=((s.y+gt*s.spd)%1);
    ctx.beginPath();ctx.arc(s.x*W,y*H,s.sz,0,Math.PI*2);
    ctx.fillStyle='hsla(185,80%,70%,.15)';ctx.fill();
  });

  if(state==='start'){drawStart();ctx.restore();return;}

  // Orbit rings
  ctx.save();
  ORBIT_RADII.forEach(r=>{
    ctx.beginPath();ctx.arc(CX(),CY(),r,0,Math.PI*2);
    ctx.strokeStyle='rgba(180,200,255,.07)';
    ctx.setLineDash([3,8]);ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
  });
  ctx.restore();

  mirages.forEach(drawMirage);

  // Particles
  particles.forEach(p=>{
    if(p.vignette){
      const a=(p.life/p.maxLife)*.38;
      const vg=ctx.createRadialGradient(CX(),CY(),H*.28,CX(),CY(),H*.72);
      vg.addColorStop(0,'rgba(0,0,0,0)');
      vg.addColorStop(1,`hsla(0,80%,25%,${a})`);
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);return;
    }
    const a=p.life/p.maxLife;
    ctx.save();ctx.globalAlpha=a;
    if(p.line){
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.ex,p.ey);
      ctx.strokeStyle=p.col;ctx.lineWidth=p.sz;ctx.stroke();
    } else {
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      ctx.fillStyle=p.col;ctx.fill();
    }
    ctx.restore();
  });

  gems.forEach(drawGem);

  floats.forEach(f=>{
    ctx.save();ctx.globalAlpha=f.life/f.maxLife;
    ctx.font=`bold ${f.sz}px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign='center';ctx.fillStyle=f.col;
    ctx.fillText(f.txt,f.x,f.y);ctx.restore();
  });

  drawHUD();
  if(state==='gameover') drawGameover();
  ctx.restore();
}

function drawMirage(m){
  if(m._dead) return;
  ctx.save();
  const sh=m.shimA;
  if(m.state==='cooling'){
    ctx.beginPath();ctx.ellipse(m.x,m.y,m.rx,m.ry,0,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${m.hue},30%,35%,${sh+.04})`;ctx.lineWidth=1;ctx.stroke();
    ctx.restore();return;
  }
  const hue=(m.containsGem&&heatMode)?28:m.hue;
  const sat=m.containsGem?90:68;

  ctx.beginPath();ctx.ellipse(m.x,m.y,m.rx,m.ry,0,0,Math.PI*2);
  ctx.fillStyle=`hsla(${hue},${sat}%,55%,${sh})`;ctx.fill();

  ctx.beginPath();ctx.ellipse(m.x+4,m.y-3,m.rx*.68,m.ry*.68,0,0,Math.PI*2);
  ctx.fillStyle=`hsla(${hue+12},${sat}%,72%,${sh*.7})`;ctx.fill();

  ctx.beginPath();ctx.ellipse(m.x,m.y,m.rx,m.ry,0,0,Math.PI*2);
  ctx.strokeStyle=`hsla(${hue},90%,80%,${Math.min(1,sh*2.2+.08)})`;
  ctx.lineWidth=m.state==='frozen'?2.2:1.5;ctx.stroke();

  if(m.isPhantom){
    ctx.font='bold 13px system-ui';ctx.textAlign='center';
    ctx.fillStyle=`hsla(0,80%,72%,${sh*3.5})`;ctx.fillText('?',m.x,m.y+4.5);
  }
  ctx.restore();
}

function drawGem(gem){
  if(gem.state==='caught') return;
  const pulse=Math.sin(gem.gp)*.5+.5;
  const inM=gem.state==='in_mirage';
  const gR=inM?(heatMode?GEM_R*3:GEM_R*2.2):GEM_R*(1.3+pulse*.5);
  ctx.save();
  const gg=ctx.createRadialGradient(gem.x,gem.y,0,gem.x,gem.y,gR);
  gg.addColorStop(0, `hsla(${gem.hue},90%,65%,.8)`);
  gg.addColorStop(.45,`hsla(${gem.hue},85%,55%,.35)`);
  gg.addColorStop(1,  `hsla(${gem.hue},80%,50%,0)`);
  ctx.beginPath();ctx.arc(gem.x,gem.y,gR,0,Math.PI*2);
  ctx.fillStyle=gg;ctx.fill();
  const bg=ctx.createRadialGradient(gem.x-3,gem.y-3,1,gem.x,gem.y,GEM_R);
  bg.addColorStop(0, `hsl(${gem.hue},85%,92%)`);
  bg.addColorStop(.5,`hsl(${gem.hue},85%,65%)`);
  bg.addColorStop(1, `hsl(${gem.hue},70%,38%)`);
  ctx.beginPath();ctx.arc(gem.x,gem.y,GEM_R,0,Math.PI*2);
  ctx.fillStyle=bg;ctx.fill();
  ctx.restore();
}

function drawHUD(){
  ctx.save();
  ctx.font=`bold 34px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.fillText(score,CX(),48);
  let row=68;
  if(heatMode){ctx.font=`bold 13px system-ui`;ctx.fillStyle='hsl(30,100%,65%)';ctx.fillText('● HEAT MODE',CX(),row);row+=19;}
  if(combo>1){ctx.font=`13px system-ui`;ctx.fillStyle='hsl(185,85%,70%)';ctx.fillText(`${combo}× COMBO`,CX(),row);}
  const heartY=H-26, tw=LIVES_MAX*34-6, sx=CX()-tw*.5;
  for(let i=0;i<LIVES_MAX;i++){
    ctx.font=`22px system-ui`;ctx.textAlign='center';
    ctx.fillStyle=i<lives?'hsl(355,90%,60%)':'rgba(100,50,60,.35)';
    ctx.fillText('♥',sx+i*34+11,heartY);
  }
  ctx.restore();
}

function drawStart(){
  ctx.save();
  // Ghost mirage atmosphere
  const gmt=gt*.0007;
  const mx=CX()+W*.2*Math.sin(gmt*1.3), my=CY()+H*.15*Math.sin(gmt);
  const sa=.15+.12*Math.sin(gt*.01);
  ctx.beginPath();ctx.ellipse(mx,my,MRG_RX,MRG_RY,0,0,Math.PI*2);
  ctx.fillStyle=`hsla(182,70%,55%,${sa})`;ctx.fill();
  ctx.beginPath();ctx.ellipse(mx,my,MRG_RX,MRG_RY,0,0,Math.PI*2);
  ctx.strokeStyle=`hsla(182,90%,75%,${sa*2})`;ctx.lineWidth=1.5;ctx.stroke();

  ctx.font=`bold 46px 'Segoe UI',system-ui,sans-serif`;ctx.textAlign='center';
  ctx.fillStyle='hsl(185,90%,74%)';ctx.fillText('MIRAGE',CX(),H*.35);
  ctx.fillStyle='rgba(255,255,255,.92)';ctx.fillText('LOCK',CX(),H*.35+52);

  ctx.font=`15px system-ui`;ctx.fillStyle='rgba(160,200,230,.65)';
  ctx.fillText('Tap. Freeze. Collect.',CX(),H*.35+80);

  ctx.font=`13px system-ui`;ctx.fillStyle='rgba(140,180,215,.55)';
  ctx.fillText('Gems orbit the center.',CX(),H*.58);
  ctx.fillText('When one enters the shimmering zone —',CX(),H*.58+23);
  ctx.fillStyle='hsl(185,80%,68%)';
  ctx.fillText('TAP to freeze & catch it!',CX(),H*.58+46);

  const ba=.5+.5*Math.sin(gt*.003);
  ctx.font=`bold 21px system-ui`;ctx.fillStyle=`rgba(255,255,255,${ba*.9})`;
  ctx.fillText('TAP TO START',CX(),H*.79);

  const best=getBest();
  if(best>0){ctx.font=`13px system-ui`;ctx.fillStyle='rgba(120,155,195,.58)';ctx.fillText(`Best: ${best}`,CX(),H*.79+28);}
  if(targetScore>0){ctx.font=`bold 13px system-ui`;ctx.fillStyle='hsl(50,100%,65%)';ctx.fillText(`CHALLENGE: Beat ${targetScore} gems`,CX(),H*.9);}
  ctx.restore();
}

function drawGameover(){
  ctx.save();
  ctx.fillStyle='rgba(3,3,18,.76)';ctx.fillRect(0,0,W,H);

  const elapsed=Math.max(0,1500-goTimer);
  const sc=Math.min(1,elapsed/320);
  const allBest=getBest(), dailyBest=getDailyBest();
  const isNew=score>=allBest;

  ctx.save();
  ctx.translate(CX(),H*.3);ctx.scale(sc,sc);
  ctx.font=`bold 74px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.95)';
  ctx.fillText(score,0,0);ctx.restore();

  ctx.textAlign='center';
  let ry=H*.3+46;
  if(isNew){ctx.font=`bold 16px system-ui`;ctx.fillStyle='hsl(185,90%,70%)';ctx.fillText('NEW BEST!',CX(),ry);}
  else{ctx.font=`15px system-ui`;ctx.fillStyle='rgba(120,155,185,.75)';ctx.fillText(`Best: ${allBest}`,CX(),ry);}
  ry+=23;
  ctx.font=`12px system-ui`;ctx.fillStyle='rgba(100,135,165,.6)';
  ctx.fillText(`Today: ${dailyBest}`,CX(),ry);ry+=22;
  ctx.fillStyle='hsl(28,80%,65%)';
  ctx.fillText(`Max streak: ${maxCombo}`,CX(),ry);ry+=22;
  if(retryCount>=10&&retryCount%10===0){
    ctx.font=`11px system-ui`;ctx.fillStyle='rgba(150,180,210,.5)';
    ctx.fillText(`Still going? Run #${retryCount}`,CX(),ry);
  }

  // Share & auto-restart
  ctx.font=`12px system-ui`;ctx.fillStyle='rgba(90,140,190,.6)';
  ctx.fillText('[ Share score ]',CX()+60,H*.3+115);
  if(sessions>=3){
    ctx.font=`11px system-ui`;
    ctx.fillStyle=`rgba(120,160,200,${autoRestart?.85:.4})`;
    ctx.fillText(`Auto-restart: ${autoRestart?'ON':'off'}`,CX(),H*.3+137);
  }

  if(targetScore>0){
    const won=score>targetScore;
    ctx.font=`bold 13px system-ui`;
    ctx.fillStyle=won?'hsl(120,80%,65%)':'hsl(30,90%,65%)';
    ctx.fillText(won?`CHALLENGE BEATEN! (${targetScore})`:`Target: ${targetScore} — ${targetScore-score} away`,CX(),H*.78);
  }

  const ba=.5+.5*Math.sin(gt*.003);
  ctx.font=`bold 22px system-ui`;ctx.fillStyle=`rgba(255,255,255,${ba*.9})`;
  ctx.fillText('TAP TO RETRY',CX(),H*.72);
  ctx.restore();
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min(ts-lastTs,50);
  lastTs=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
const up=new URLSearchParams(window.location.search);
if(up.has('target')) targetScore=parseInt(up.get('target'))||0;
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
